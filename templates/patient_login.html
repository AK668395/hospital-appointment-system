<!DOCTYPE html>
<html>
<head>
<title>Patient Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Patient Login</h1>

<form method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<p>{{ error }}</p>

<a href="/signup">
Create Account
</a>

</div>

</body>
</html>
