<!DOCTYPE html>
<html>

<head>

    <title>CityCare Hospital</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="/static/darkmode.js"></script>

</head>

<body>

<!-- HERO SECTION -->

<div class="hero">

    <div class="overlay">

        <h1>CityCare Hospital</h1>

        <p>Your Health, Our Priority</p>

        <div class="buttons">

            <a href="/patient_login">
                Patient Login
            </a>

            <a href="/signup">
                Patient Signup
            </a>

            <a href="/appointment">
                Book Appointment
            </a>

            <a href="/chatbot">
                AI Chatbot
            </a>

            <a href="/login">
                Admin Login
            </a>

        </div>

        <br>

        <button onclick="toggleDarkMode()">
            Toggle Dark Mode
        </button>

    </div>

</div>

<!-- DOCTOR SECTION -->

<div class="doctor-section">

    <h1>Our Specialists</h1>

    <div class="doctor-cards">

        <!-- DOCTOR 1 -->

        <div class="doctor-card">

            <img src="/static/doctors/doctor1.jpg">

            <h3>Dr. Sharma</h3>

            <p>Cardiologist</p>

        </div>

        <!-- DOCTOR 2 -->

        <div class="doctor-card">

            <img src="/static/doctors/doctor2.jpg">

            <h3>Dr. Mehta</h3>

            <p>Neurologist</p>

        </div>

        <!-- DOCTOR 3 -->

        <div class="doctor-card">

            <img src="/static/doctors/doctor3.jpg">

            <h3>Dr. Rao</h3>

            <p>Orthopedic Specialist</p>

        </div>

    </div>

</div>

</body>

</html>
